<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Aniversário!</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="message-body">
    <!-- Canvas onde os confetes serão desenhados via JavaScript -->
    <canvas id="confettiCanvas"></canvas>

    <!-- Balões decorativos feitos com CSS puro -->
    <div class="balloons-container">
        <div class="balloon balloon-1"></div>
        <div class="balloon balloon-2"></div>
        <div class="balloon balloon-3"></div>
        <div class="balloon balloon-4"></div>
        <div class="balloon balloon-5"></div>
    </div>

    <div class="card message-card scale-in">
        <h1 id="bdayMessage">Feliz aniversário! 🎂🎈</h1>
        <p class="wishes">Que o seu dia seja repleto de alegria, sorrisos e momentos inesquecíveis! Parabéns! 🥳</p>
        
        <button id="newBtn" class="btn secondary-btn">
            ⬅️ Gerar nova mensagem
        </button>
    </div>

    <script src="message.js"></script>
</body>
</html>
