<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Aniversário!</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1970337791330138"
     crossorigin="anonymous"></script>
</head>
<body class="message-body birthday-theme">
    <canvas id="confettiCanvas"></canvas>

    <div class="balloons-container">
        <div class="balloon balloon-1"></div>
        <div class="balloon balloon-2"></div>
        <div class="balloon balloon-3"></div>
        <div class="balloon balloon-4"></div>
        <div class="balloon balloon-5"></div>
    </div>

    <div class="card message-card scale-in">
        <h1 id="mainTitle">Feliz aniversário! 🎂🎈</h1>
        <p class="wishes">...</p>
        
        <button id="shareBtn" class="btn whatsapp-btn">
            📲 Compartilhar no WhatsApp
        </button>
        <button id="newBtn" class="btn secondary-btn">
            ⬅️ Gerar nova mensagem
        </button>
    </div>

    <script src="message.js"></script>
</body>
</html>
